# nginx/default.conf
server {
    listen 80;
    
    # Folder tempat Nginx mencari file HTML/JS/CSS Anda
    root /usr/share/nginx/html;
    
    # File utama yang akan dibuka pertama kali
    index index.html;

    location / {
        # Aturan emas untuk Single Page Application (SPA) seperti React:
        # 1. Coba cari file yang persis sama dengan URL ($uri)
        # 2. Coba cari folder yang namanya sama ($uri/)
        # 3. JIKA KEDUANYA TIDAK KETEMU, arahkan kembali ke /index.html
        try_files $uri $uri/ /index.html;
    }

    # (Opsional) Mengatur Cache untuk file statis agar website loading lebih cepat di browser pengguna
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}